name: Build Containers for MikroTik
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
        include:
          - image_name: "nginx"
            docker_source: "nginx:1.25.3-alpine"
          - image_name: "mihomo"
            docker_source: "wiktorbgu/mihomo-mikrotik:latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo wget unzip

      - name: Build and Save Image
        run: |
          TEMP_TAR="temp.tar"
          FINAL_NAME="${{ matrix.image_name }}-${{ matrix.arch }}.tar.gz"

          echo "Processing ${{ matrix.image_name }} for ${{ matrix.arch }}..."

          skopeo copy \
            --override-os linux \
            --override-arch ${{ matrix.arch }} \
            docker://${{ matrix.docker_source }} \
            docker-archive:$TEMP_TAR:${{ matrix.docker_source }}

          if [ "${{ matrix.image_name }}" = "mihomo" ]; then
            echo "Adding zashboard UI to mihomo image..."
            
            # Распаковываем оригинальный tar
            mkdir -p temp_image
            cd temp_image
            tar -xf ../$TEMP_TAR
            
            # Скачиваем панель
            wget -O dist.zip https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
            mkdir -p ui_content
            unzip -q dist.zip -d ui_content/
            rm dist.zip
            
            # Если есть вложенная папка dist, перемещаем
            if [ -d "ui_content/dist" ]; then
              mv ui_content/dist/* ui_content/
              rm -rf ui_content/dist
            fi
            
            # Добавляем файлы в КАЖДЫЙ слой, но без повреждения структуры
            for layer_file in $(find . -name "layer.tar" -type f); do
              layer_dir=$(dirname "$layer_file")
              echo "Processing: $layer_dir"
              
              cd "$layer_dir"
              
              # Распаковываем слой во временную папку
              mkdir -p temp_extract
              cd temp_extract
              tar -xf ../layer.tar
              
              # Копируем UI
              mkdir -p ui
              cp -r ../../../ui_content/* ui/
              
              # Упаковываем обратно
              tar -cf ../layer.tar .
              
              cd ../..
              rm -rf "$layer_dir/temp_extract"
            done
            
            # Упаковываем ОБРАТНО в tar (сохраняя manifest.json и все файлы)
            cd ..
            tar -cf $TEMP_TAR -C temp_image .
            rm -rf temp_image
          fi

          gzip -c $TEMP_TAR > $FINAL_NAME
          rm $TEMP_TAR
          echo "Done: $FINAL_NAME"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          files: "*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
