name: Build Containers for MikroTik
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64] # Можно добавить amd64, если нужно для других роутеров
        include:
          - image_name: "nginx"
            docker_source: "nginx:1.25.3-alpine"
          - image_name: "mihomo"
            docker_source: "wiktorbgu/mihomo-mikrotik:latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Build and Save Image
        run: |
          # Переменные имен
          TEMP_TAR="temp.tar"
          # Используем простое имя: mihomo-arm64.tar.gz
          FINAL_NAME="${{ matrix.image_name }}-${{ matrix.arch }}.tar.gz"

          echo "Processing ${{ matrix.image_name }} for ${{ matrix.arch }}..."

          # 1. Стягиваем и конвертируем в Docker V2 (Legacy) формат
          # Это создает правильный manifest.json и config.json внутри архива
          skopeo copy \
            --override-os linux \
            --override-arch ${{ matrix.arch }} \
            docker://${{ matrix.docker_source }} \
            docker-archive:$TEMP_TAR:${{ matrix.docker_source }}

          # 2. Сжимаем в .gz, который понимает MikroTik
          gzip -c $TEMP_TAR > $FINAL_NAME

          # 3. Очистка
          rm $TEMP_TAR
          echo "Done: $FINAL_NAME"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          files: "*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
