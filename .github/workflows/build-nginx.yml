name: Build Containers for MikroTik
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
        image:
          - name: "nginx"
            source: "nginx:1.25.3-alpine"
          - name: "mihomo"
            source: "wiktorbgu/mihomo-mikrotik:latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Save Image
        run: |
          FINAL_NAME="${{ matrix.image.name }}-${{ matrix.arch }}.tar.gz"
          
          if [ "${{ matrix.image.name }}" = "mihomo" ]; then
            # Скачиваем файлы на хосте (GitHub Runner)
            echo "Downloading zashboard UI..."
            wget -O dist.zip https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
            
            echo "Downloading geoip.metadb..."
            wget -O geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
            
            # Создаем Dockerfile
            printf '%s\n' \
              'FROM wiktorbgu/mihomo-mikrotik:latest' \
              '' \
              'COPY dist.zip /tmp/dist.zip' \
              'COPY geoip.metadb /etc/mihomo/geoip.metadb' \
              '' \
              'RUN unzip /tmp/dist.zip -d /ui && rm /tmp/dist.zip' \
              > Dockerfile
            
            # Собираем образ
            docker buildx build \
              --platform linux/${{ matrix.arch }} \
              --load \
              -t mihomo-with-ui \
              .
            
            docker save mihomo-with-ui -o temp.tar
          else
            # Для nginx - используем skopeo
            sudo apt-get update
            sudo apt-get install -y skopeo
            skopeo copy \
              --override-os linux \
              --override-arch ${{ matrix.arch }} \
              docker://${{ matrix.image.source }} \
              docker-archive:temp.tar:${{ matrix.image.source }}
          fi
          
          # Сжимаем для MikroTik
          gzip -c temp.tar > $FINAL_NAME
          rm temp.tar
          echo "Done: $FINAL_NAME"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          files: "*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
