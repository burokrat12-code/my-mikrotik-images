name: Build Nginx for MikroTik
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Save Docker Image
        run: |
          # Создаем пустой Dockerfile на лету, который просто берет официальный Nginx
          echo "FROM --platform=linux/${{ matrix.arch }} nginx:1.25.3-alpine" > Dockerfile
          
          # Собираем его локально и сразу сохраняем в архив
          docker build --platform linux/${{ matrix.arch }} -t nginx-temp-${{ matrix.arch }} .
          docker save nginx-temp-${{ matrix.arch }} > nginx-${{ matrix.arch }}.tar

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.25.3
          files: nginx-${{ matrix.arch }}.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
