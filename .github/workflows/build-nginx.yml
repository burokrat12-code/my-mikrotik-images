name: Build Nginx for MikroTik
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Save Image
        run: |
          # Используем buildx для создания образа и вывода его в tar
          docker buildx build \
            --platform linux/${{ matrix.arch }} \
            --output type=docker,dest=nginx-${{ matrix.arch }}.tar \
            --tag nginx:1.25.3-alpine \
            docker.io/library/nginx:1.25.3-alpine

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.25.3
          files: nginx-${{ matrix.arch }}.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
