name: Build Containers for MikroTik
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64] # Можно добавить amd64, если нужно для других роутеров
        include:
          - image_name: "nginx"
            docker_source: "nginx:1.25.3-alpine"
          - image_name: "mihomo"
            docker_source: "wiktorbgu/mihomo-mikrotik:latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo wget unzip

      - name: Build and Save Image
        run: |
          # Переменные имен
          TEMP_TAR="temp.tar"
          # Используем простое имя: mihomo-arm64.tar.gz
          FINAL_NAME="${{ matrix.image_name }}-${{ matrix.arch }}.tar.gz"

          echo "Processing ${{ matrix.image_name }} for ${{ matrix.arch }}..."

          # 1. Стягиваем и конвертируем в Docker V2 (Legacy) формат
          skopeo copy \
            --override-os linux \
            --override-arch ${{ matrix.arch }} \
            docker://${{ matrix.docker_source }} \
            docker-archive:$TEMP_TAR:${{ matrix.docker_source }}

          # 2. Для mihomo добавляем панель внутрь образа
          if [ "${{ matrix.image_name }}" = "mihomo" ]; then
            echo "Adding zashboard UI to mihomo image..."
            
            # Создаем временную директорию
            mkdir -p temp_image
            cd temp_image
            
            # Распаковываем tar архив
            tar -xf ../$TEMP_TAR
            
            # Скачиваем и распаковываем панель прямо в папку ui
            wget -O dist.zip https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
            mkdir -p ui
            unzip dist.zip -d ui/
            rm dist.zip
            
            # Перемещаем содержимое из ui/dist/ в ui/ (если есть вложенная папка dist)
            if [ -d "ui/dist" ]; then
              mv ui/dist/* ui/
              rm -rf ui/dist
            fi
            
            # Находим последний слой (там где файловая система)
            # Ищем самый глубокий слой с layer.tar
            LAYER_DIR=$(find . -name "layer.tar" -type f | head -1 | xargs dirname)
            
            if [ -n "$LAYER_DIR" ] && [ -d "$LAYER_DIR" ]; then
              cd $LAYER_DIR
              
              # Распаковываем слой
              tar -xf layer.tar 2>/dev/null || true
              
              # Создаем папку ui и копируем файлы
              mkdir -p ui
              cp -r ../../ui/* ui/
              
              # Упаковываем обратно
              tar -cf layer.tar . --exclude=layer.tar
              
              cd ../../
            fi
            
            # Упаковываем измененный образ обратно в tar
            tar -cf ../$TEMP_TAR .
            cd ..
            rm -rf temp_image
          fi

          # 3. Сжимаем в .gz, который понимает MikroTik
          gzip -c $TEMP_TAR > $FINAL_NAME

          # 4. Очистка
          rm $TEMP_TAR
          echo "Done: $FINAL_NAME"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          files: "*.tar.gz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
